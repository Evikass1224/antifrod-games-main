<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css.css">
    <title>Игры обучения борьбы с мошенничеством</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
  </head> 
  <body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="card">
      <div class="shield-wrap">
        <svg class="shield-icon" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M36 6L10 18V36C10 51.5 36 66 36 66C36 66 62 51.5 62 36V18L36 6Z"
                fill="url(#sg)" stroke="#00c8e8" stroke-width="2"/>
          <path d="M25 36l8 8 14-14" stroke="#0099cc" stroke-width="3.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="sg" x1="10" y1="6" x2="62" y2="66" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00e5ff" stop-opacity=".25"/>
              <stop offset="100%" stop-color="#a78bfa" stop-opacity=".25"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <h1 class="title">Играй. Учись.<br>Защищайся от мошенников</h1>
      <p class="subtitle"><span></span>выбери свой уровень<span></span></p>

      <div class="btn-list">

        <a href="https://disk.yandex.ru/d/UtY4-DCIFHk92g" target="_blank" class="btn btn-1">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
              <defs><filter id="glow1"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
              <circle cx="11" cy="11" r="6" fill="#00c8e8" filter="url(#glow1)"/>
              <circle cx="25" cy="11" r="6" fill="#00c8e8" filter="url(#glow1)"/>
              <circle cx="11" cy="11" r="3.5" fill="#00e5ff"/>
              <circle cx="25" cy="11" r="3.5" fill="#00e5ff"/>
              <circle cx="18" cy="20" r="13" fill="#00c8e8" filter="url(#glow1)"/>
              <ellipse cx="18" cy="22" rx="7" ry="6" fill="#00e5ff" opacity="0.4"/>
              <circle cx="14" cy="18" r="2.2" fill="#003a4a"/>
              <circle cx="22" cy="18" r="2.2" fill="#003a4a"/>
              <circle cx="14.8" cy="17.2" r="0.9" fill="white"/>
              <circle cx="22.8" cy="17.2" r="0.9" fill="white"/>
              <ellipse cx="18" cy="22" rx="2.2" ry="1.5" fill="#003a4a"/>
              <path d="M14.5 25 Q18 28 21.5 25" stroke="#003a4a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
              <circle cx="12" cy="22" r="2.5" fill="#00e5ff" opacity="0.5"/>
              <circle cx="24" cy="22" r="2.5" fill="#00e5ff" opacity="0.5"/>
            </svg>
          </span>
          <span class="btn-label">Для дошколят</span>
          <span class="btn-arrow">→</span>
        </a>

        <a href="https://disk.yandex.ru/d/Znv3iQkv546eDg" target="_blank" class="btn btn-2">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
              <defs><filter id="glow2"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
              <path d="M14 8 Q18 4 22 8" stroke="#ff4ecd" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow2)"/>
              <rect x="8" y="10" width="20" height="20" rx="5" fill="#d4009e" filter="url(#glow2)"/>
              <rect x="11" y="20" width="14" height="8" rx="3.5" fill="#ff4ecd" opacity="0.7"/>
              <line x1="18" y1="20" x2="18" y2="28" stroke="#ff80e5" stroke-width="1.2" stroke-linecap="round"/>
              <circle cx="18" cy="20" r="1.3" fill="#ff80e5"/>
              <rect x="8" y="10" width="20" height="4" rx="3" fill="#ff4ecd" opacity="0.5"/>
              <line x1="11" y1="13" x2="11" y2="26" stroke="#ff80e5" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.6"/>
              <line x1="25" y1="13" x2="25" y2="26" stroke="#ff80e5" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.6"/>
            </svg>
          </span>
          <span class="btn-label">Для школьников</span>
          <span class="btn-arrow">→</span>
        </a>

        <a href="https://s-savelyeva.github.io/psy-game/" target="_blank" class="btn btn-3">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
              <defs><filter id="glow3"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
              <path d="M8 20 Q8 8 18 8 Q28 8 28 20" stroke="#c9a000" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow3)"/>
              <rect x="5" y="19" width="7" height="11" rx="3.5" fill="#a07800" filter="url(#glow3)"/>
              <rect x="6.5" y="20.5" width="4" height="8" rx="2" fill="#ffe234" opacity="0.8"/>
              <rect x="24" y="19" width="7" height="11" rx="3.5" fill="#a07800" filter="url(#glow3)"/>
              <rect x="25.5" y="20.5" width="4" height="8" rx="2" fill="#ffe234" opacity="0.8"/>
              <circle cx="8" cy="22" r="1" fill="#fff0a0" opacity="0.8"/>
              <circle cx="27" cy="22" r="1" fill="#fff0a0" opacity="0.8"/>
            </svg>
          </span>
          <span class="btn-label">Для подростков</span>
          <span class="btn-arrow">→</span>
        </a>

        <a href="https://scam-dot-su.onrender.com/" target="_blank" class="btn btn-4">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
              <defs><filter id="glow4"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
              <path d="M13 11 L13 9 Q13 7 18 7 Q23 7 23 9 L23 11" stroke="#00cc77" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#glow4)"/>
              <rect x="5" y="11" width="26" height="18" rx="4" fill="#00995e" filter="url(#glow4)"/>
              <rect x="5" y="18" width="26" height="3" fill="#00ff99" opacity="0.5"/>
              <rect x="15" y="17" width="6" height="5" rx="1.5" fill="#00ff99" opacity="0.9"/>
              <circle cx="18" cy="19.5" r="1.2" fill="#00995e"/>
              <rect x="7" y="13" width="10" height="3" rx="1.5" fill="#00ff99" opacity="0.25"/>
            </svg>
          </span>
          <span class="btn-label">Для взрослых</span>
          <span class="btn-arrow">→</span>
        </a>

      </div>
    </div>

    <p class="footer-note">Защити себя и близких - <strong>знания это щит</strong></p>
  </body>
</html>
